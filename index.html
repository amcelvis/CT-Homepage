<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Tower Menu</title>
<style>
  :root{
    --purple:#5C1954; --purple-deep:#3A0E35; --purple-soft:#6E2163;
    --purple-tint:#F4EDF3; --purple-mid:#B79DB2;
    --yellow:#FDD000; --red:#E4003B;
    --ink:#231F20; --grey:#6E6873;
    --line:#E9E4EA; --card:#FFFFFF;
    /* set PAGE_BG below to your Tableau dashboard background so the
       area under the bar blends invisibly into the dashboard */
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;
  }

  /* ================= BAR ================= */
  .bar{
    display:flex;align-items:stretch;gap:2px;
    background:linear-gradient(120deg,var(--purple-deep),var(--purple) 60%,var(--purple-soft));
    height:52px;padding:0 14px 0 10px;
    position:relative;z-index:10;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:0 14px 0 4px;flex-shrink:0;}
  .logo{
    width:30px;height:30px;border-radius:7px;background:var(--yellow);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;color:var(--purple);font-size:13px;
  }
  .brand .t{color:#fff;font-size:13px;font-weight:700;letter-spacing:.2px;white-space:nowrap;}
  .brand .t small{display:block;font-size:8.5px;font-weight:600;letter-spacing:1.8px;color:var(--yellow);text-transform:uppercase;}

  nav{display:flex;align-items:stretch;flex:1;overflow:visible;}
  .item{position:relative;display:flex;}
  .item > button{
    background:none;border:none;cursor:pointer;font-family:inherit;
    color:#E8DCE6;font-size:12px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;
    padding:0 14px;display:flex;align-items:center;gap:6px;
    border-bottom:3px solid transparent;transition:color .13s, border-color .13s, background .13s;
  }
  .item > button .car{font-size:8px;transition:transform .15s;}
  .item > button:hover,.item.open > button{
    color:#fff;background:rgba(255,255,255,.06);border-bottom-color:var(--yellow);
  }
  .item.open > button .car{transform:rotate(180deg);}
  .item > button .n{
    font-size:9px;font-weight:700;background:rgba(255,255,255,.16);color:#fff;
    border-radius:9px;padding:1px 6px;
  }

  /* ================= DROPDOWN ================= */
  .panel{
    position:absolute;top:100%;left:0;min-width:280px;max-width:340px;
    background:var(--card);border:1px solid var(--line);border-radius:0 0 10px 10px;
    box-shadow:0 14px 30px -8px rgba(58,14,53,.28);
    display:none;overflow:hidden;
  }
  .item.right .panel{left:auto;right:0;border-radius:0 0 10px 10px;}
  .item.open .panel{display:block;animation:drop .16s ease-out;}
  @keyframes drop{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:none;}}
  .panel .ph{
    padding:10px 14px 8px 14px;font-size:10px;font-weight:700;color:var(--purple);
    text-transform:uppercase;letter-spacing:1.4px;
    border-bottom:3px solid var(--yellow);
  }
  .panel ul{list-style:none;padding:4px 0;max-height:46vh;overflow-y:auto;}
  .panel a{
    display:flex;align-items:center;gap:8px;
    padding:9px 14px;font-size:12.5px;color:var(--ink);text-decoration:none;
    border-left:3px solid transparent;transition:background .12s,border-color .12s;
  }
  .panel li + li a{border-top:1px solid #F5F1F5;}
  .panel a:hover,.panel a:focus-visible{background:var(--purple-tint);border-left-color:var(--purple);outline:none;}
  .panel a .nm{flex:1;}
  .panel a .arrow{color:var(--purple);opacity:0;font-size:12px;transform:translateX(-3px);transition:.14s;}
  .panel a:hover .arrow{opacity:1;transform:none;}
  .flag{font-size:8px;font-weight:800;color:#fff;background:var(--red);border-radius:3px;padding:2px 5px;letter-spacing:.7px;flex-shrink:0;}
  .panel .desc{display:block;font-size:10.5px;color:var(--grey);margin-top:1px;}

  /* search + registry link, right side */
  .tools{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .search{position:relative;display:flex;align-items:center;}
  .search input{
    width:170px;padding:6px 10px 6px 28px;border:1px solid rgba(255,255,255,.18);
    border-radius:30px;background:rgba(0,0,0,.25);color:#fff;font-size:11.5px;font-family:inherit;
    transition:width .2s, border-color .15s;
  }
  .search input:focus{outline:none;border-color:var(--yellow);width:220px;}
  .search input::placeholder{color:var(--purple-mid);}
  .search::before{content:"⌕";position:absolute;left:10px;color:var(--purple-mid);font-size:13px;}
  .reg{
    color:var(--yellow);font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap;
    border:1px solid rgba(253,208,0,.45);border-radius:30px;padding:6px 12px;
    transition:background .15s,color .15s;
  }
  .reg:hover{background:var(--yellow);color:var(--purple);}

  /* search results panel (spans under bar) */
  .results{
    position:absolute;top:100%;right:14px;width:380px;max-width:92vw;
    background:var(--card);border:1px solid var(--line);border-radius:0 0 10px 10px;
    box-shadow:0 14px 30px -8px rgba(58,14,53,.28);display:none;z-index:9;
  }
  .results.show{display:block;animation:drop .16s ease-out;}
  .results ul{list-style:none;padding:4px 0;max-height:50vh;overflow-y:auto;}
  .results .ph{padding:9px 14px;font-size:10px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:1.2px;border-bottom:1px solid var(--line);}
  .results a{display:block;padding:9px 14px;font-size:12.5px;color:var(--ink);text-decoration:none;}
  .results li + li a{border-top:1px solid #F5F1F5;}
  .results a:hover{background:var(--purple-tint);}
  .results .sec{font-size:9.5px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:1px;}
  .results .none{padding:16px 14px;font-size:12px;color:var(--grey);}
  mark{background:var(--yellow);padding:0 1px;border-radius:2px;}

  .err{padding:10px 16px;background:#FDECEF;color:var(--red);font-size:12px;border-bottom:1px solid #F5C6D0;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>

<div class="bar" id="bar">
  <div class="brand">
    <div class="logo">IE</div>
    <div class="t"><small>Control Tower</small>Dashboards</div>
  </div>
  <nav id="nav" aria-label="Dashboard sections"></nav>
  <div class="tools">
    <div class="search"><input id="q" type="search" placeholder="Search…" aria-label="Search dashboards" autocomplete="off"></div>
    <a class="reg" id="reg" href="#" target="_blank" rel="noopener">+ Registry</a>
  </div>
  <div class="results" id="results"></div>
</div>
<div id="err"></div>

<script>
/* ============================ CONFIG ============================ */
const REGISTRY_URL = "dashboard-registry.csv";
const EDIT_URL     = "#";          // GitHub edit URL for the CSV
const PAGE_BG      = "#F6F4F7";    // match your Tableau dashboard background
const SHOW_DESCRIPTIONS = true;     // descriptions under each link in dropdowns

document.body.style.background = PAGE_BG;
document.getElementById("reg").href = EDIT_URL;

/* ---- CSV parser ---- */
function parseCSV(text){
  const rows=[]; let row=[], field="", inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; } else field+=c; }
    else{
      if(c==='"') inQ=true;
      else if(c===","){row.push(field);field="";}
      else if(c==="\n"||c==="\r"){
        if(c==="\r"&&text[i+1]==="\n")i++;
        row.push(field);field="";
        if(row.some(v=>v.trim()!=="")) rows.push(row); row=[];
      } else field+=c;
    }
  }
  if(field!==""||row.length){row.push(field);if(row.some(v=>v.trim()!==""))rows.push(row);}
  return rows;
}
function toObjects(rows){
  const head=rows[0].map(h=>h.trim());
  return rows.slice(1).map(r=>{const o={};head.forEach((h,i)=>o[h]=(r[i]||"").trim());return o;});
}
const esc=s=>s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

let ALL=[];

function buildNav(){
  const sections=new Map();
  for(const d of ALL){
    if(!sections.has(d.Section)) sections.set(d.Section,{sort:Number(d["Section Sort"]||999),links:[]});
    sections.get(d.Section).links.push(d);
  }
  const ordered=[...sections.entries()].sort((a,b)=>a[1].sort-b[1].sort);
  const nav=document.getElementById("nav");
  const half=Math.ceil(ordered.length/2);

  nav.innerHTML=ordered.map(([name,sec],i)=>{
    const links=sec.links.sort((a,b)=>Number(a["Sort Order"]||999)-Number(b["Sort Order"]||999));
    const rows=links.map(d=>{
      const flag=d.Status?`<span class="flag">${esc(d.Status)}</span>`:"";
      const desc=(SHOW_DESCRIPTIONS&&d.Description)?`<span class="desc">${esc(d.Description)}</span>`:"";
      return `<li><a href="${esc(d.URL)}" target="_blank" rel="noopener">
        <span class="nm">${esc(d["Dashboard Name"])}${desc}</span>${flag}<span class="arrow">→</span></a></li>`;
    }).join("");
    return `<div class="item${i>=half?" right":""}">
      <button aria-expanded="false" aria-haspopup="true">${esc(name)} <span class="n">${links.length}</span> <span class="car">▼</span></button>
      <div class="panel"><div class="ph">${esc(name)}</div><ul>${rows}</ul></div>
    </div>`;
  }).join("");

  /* open/close behavior: hover opens, click toggles, outside/Esc closes */
  const items=[...nav.querySelectorAll(".item")];
  const closeAll=ex=>items.forEach(it=>{ if(it!==ex){it.classList.remove("open");it.querySelector("button").setAttribute("aria-expanded","false");} });
  items.forEach(it=>{
    const btn=it.querySelector("button");
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      const open=it.classList.toggle("open");
      btn.setAttribute("aria-expanded",open);
      closeAll(it); hideResults();
    });
    it.addEventListener("mouseenter",()=>{ closeAll(it); it.classList.add("open"); btn.setAttribute("aria-expanded","true"); hideResults(); });
    it.addEventListener("mouseleave",()=>{ it.classList.remove("open"); btn.setAttribute("aria-expanded","false"); });
  });
  document.addEventListener("click",()=>{ closeAll(); hideResults(); });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ closeAll(); hideResults(); document.getElementById("q").blur(); } });
}

/* ---- search ---- */
const resultsEl=document.getElementById("results");
function hideResults(){ resultsEl.classList.remove("show"); }
function search(qv){
  const f=qv.trim().toLowerCase();
  if(!f){ hideResults(); return; }
  const hits=ALL.filter(d=>(d["Dashboard Name"]+" "+d["Description"]+" "+d.Section).toLowerCase().includes(f)).slice(0,12);
  const hl=s=>esc(s).replace(new RegExp("("+f.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig"),"<mark>$1</mark>");
  resultsEl.innerHTML=`<div class="ph">${hits.length} result${hits.length===1?"":"s"}</div>`+
    (hits.length?`<ul>${hits.map(d=>`<li><a href="${esc(d.URL)}" target="_blank" rel="noopener">
      <span class="sec">${esc(d.Section)}</span><br>${hl(d["Dashboard Name"])}</a></li>`).join("")}</ul>`
    :`<div class="none">Nothing matches "${esc(qv)}".</div>`);
  resultsEl.classList.add("show");
}
let t; const q=document.getElementById("q");
q.addEventListener("input",e=>{clearTimeout(t);t=setTimeout(()=>search(e.target.value),120);});
q.addEventListener("click",e=>e.stopPropagation());

async function init(){
  try{
    const res=await fetch(REGISTRY_URL+(REGISTRY_URL.includes("?")?"&":"?")+"v="+Date.now());
    if(!res.ok) throw new Error("HTTP "+res.status);
    ALL=toObjects(parseCSV(await res.text())).filter(d=>d["Dashboard Name"]);
    buildNav();
  }catch(e){
    document.getElementById("err").innerHTML=
      `<div class="err">Couldn't load <b>${esc(REGISTRY_URL)}</b> (${esc(e.message)}) — check the file sits next to this page in the repo.</div>`;
  }
}
init();
</script>
</body>
</html>
